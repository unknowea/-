
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>መራሔ ጥበብ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans Ethiopic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        color: #000000;
        transition: background-color 300ms ease, color 300ms ease;
      }
      html.dark body {
        background-color: #09090b;
        color: #ffffff;
      }
      .font-serif-church {
        font-family: 'Playfair Display', serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      #root {
        display: flex;
        justify-content: center;
        min-height: 100vh;
        background-color: #f8fafc;
        transition: background-color 300ms ease;
      }
      html.dark #root {
        background-color: #020617;
      }
      .main-container {
        width: 100%;
        max-width: 560px;
        background-color: #ffffff;
        box-shadow: 0 10px 50px rgba(14, 165, 233, 0.1);
        position: relative;
        min-height: 100vh;
        transition: background-color 300ms ease, box-shadow 300ms ease;
      }
      html.dark .main-container {
        background-color: #09090b;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: #0ea5e9;
        cursor: pointer;
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 2px 8px rgba(14, 165, 233, 0.3);
      }
      html.dark input[type="range"]::-webkit-slider-thumb {
        border-color: #18181b;
      }
    </style>
  <script type="importmap">

    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@heroicons/react/": "https://esm.sh/@heroicons/react@^2.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
